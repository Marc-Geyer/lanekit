{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ t.exception_title }}{% endblock %}
{% block content %}
<div class="mb-3">
  <a href="{% url 'calendar' %}" class="btn btn-sm btn-outline-secondary rounded-pill">
    <i class="bi bi-arrow-left me-1"></i>{{ t.btn_back }}
  </a>
</div>
<div class="sc-card p-4" style="max-width:600px;margin:0 auto">
  <h4 class="fw-bold mb-2" style="font-family:'Syne',sans-serif">
    <i class="bi bi-calendar-x text-danger me-2"></i>{{ t.exception_title }}
  </h4>
  <p class="text-muted mb-4">{{ t.exception_subtitle }}</p>
  {% crispy form %}
</div>
{% endblock %}
